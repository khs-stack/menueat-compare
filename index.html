<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>메뉴잇 경쟁사 비교</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--M:#1A56FF;--M2:#EEF3FF;--bg:#F4F6FA;--t1:#1A202C;--t2:#4A5568;--t3:#A0AEC0;--bd:#E2E8F0;--or:#DD6B20;--ok:#38A169;--err:#E53E3E}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--t1);font-size:13px;padding-bottom:80px}

/* 상단바 */
.topbar{background:#1A202C;padding:0 16px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100}
.logo{color:#fff;font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px}
.logo-b{background:var(--M);border-radius:5px;padding:2px 8px;font-size:12px}
.topbar-r{display:flex;gap:6px}
.btn{border:none;border-radius:8px;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-family:inherit;white-space:nowrap}
.btn-blue{background:var(--M);color:#fff}
.btn-ghost{background:rgba(255,255,255,.1);color:#CBD5E0}
.btn-white{background:#fff;color:var(--t1);border:1px solid var(--bd)}
.btn-green{background:var(--ok);color:#fff}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}

/* 하단 탭 */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:#1A202C;display:flex;z-index:9999;border-top:1px solid #2D3748;height:64px}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#4A5568;cursor:pointer;gap:3px;font-size:10px;font-weight:600;padding:8px 0;border:none;background:none;font-family:inherit}
.tb i{font-size:22px}
.tb.on{color:#60A5FA}

/* 페이지 */
.page{display:none;padding:14px 14px 16px}
.page.on{display:block}

/* 통계 카드 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sc{background:#fff;border-radius:10px;padding:13px 14px;border-left:3px solid var(--M)}
.sc.red{border-color:var(--err)}.sc.orange{border-color:var(--or)}.sc.green{border-color:var(--ok)}
.sc .sv{font-size:22px;font-weight:800}
.sc .sl{font-size:11px;color:var(--t3);margin-top:2px}

/* 필터 */
.fbar{background:#fff;border-radius:10px;padding:10px 12px;margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
.frow{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.fi{flex:1;min-width:100px;padding:7px 10px;border:1px solid var(--bd);border-radius:7px;font-size:12px;background:#fff;outline:none}
.gchips{display:flex;gap:5px;flex-wrap:wrap}
.gc{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--bd);background:#fff;color:var(--t3)}
.gc.on{color:#fff;border-color:currentColor}
.gc.on.all{background:#1A202C;border-color:#1A202C}
.gc.on.S{background:#7C3AED;border-color:#7C3AED}
.gc.on.A{background:var(--or);border-color:var(--or)}
.gc.on.B{background:#D69E2E;border-color:#D69E2E}
.gc.on.C{background:#3182CE;border-color:#3182CE}
.gc.on.D{background:#718096;border-color:#718096}

/* 업체 카드 (모바일은 카드형) */
.co-card{background:#fff;border-radius:10px;padding:13px 14px;margin-bottom:10px;border:1px solid var(--bd)}
.co-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.co-name{font-weight:700;font-size:15px;flex:1}
.grade{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:11px;font-weight:800}
.gS{background:#7C3AED;color:#fff}.gA{background:var(--or);color:#fff}
.gB{background:#D69E2E;color:#fff}.gC{background:#3182CE;color:#fff}.gD{background:#718096;color:#fff}
.co-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.co-item{background:var(--bg);border-radius:7px;padding:7px 9px}
.co-item .k{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;margin-bottom:2px}
.co-item .v{font-size:12px;font-weight:600}
.co-item .v.orange{color:var(--or)}
.co-item .v.red{color:var(--err)}
.co-item .v.green{color:var(--ok)}
.co-actions{display:flex;gap:6px;margin-top:10px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.tok{background:#C6F6D5;color:#276749}.tbad{background:#FED7D7;color:#9B2C2C}.twarn{background:#FEFCBF;color:#744210}
.tneed{background:#E9D8FD;color:#553C9A}
.updt-dot{width:7px;height:7px;border-radius:50%;background:var(--err);display:inline-block;margin-left:4px;vertical-align:middle;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* 비교 탭 */
.banner{background:linear-gradient(135deg,#1A202C,#2D3748);border-radius:10px;padding:12px 14px;color:#fff;margin-bottom:12px}
.banner h3{font-size:13px;font-weight:700;margin-bottom:4px}
.banner p{font-size:11px;color:#718096}
.cmp-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.chip{display:inline-flex;padding:5px 12px;border:1px solid var(--bd);border-radius:20px;font-size:12px;cursor:pointer;background:#fff}
.chip.sel{background:var(--M2);border-color:var(--M);color:var(--M);font-weight:600}
.cmp-card{background:#fff;border-radius:10px;padding:13px 14px;margin-bottom:10px;border:1px solid var(--bd)}
.cmp-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #F0F4F8;font-size:12px}
.cmp-row:last-child{border-bottom:none}
.cmp-row .ck{color:var(--t3);font-size:11px}
.cmp-row .cv{font-weight:600}
.vsbox{margin-top:8px;padding:9px;border-radius:7px;font-size:11px;line-height:1.7}
.vsbox.good{background:#F0FFF4;border:1px solid #9AE6B4}
.vsbox.bad{background:#FFF5F5;border:1px solid #FEB2B2}
.vsbox.mix{background:#FFFFF0;border:1px solid #FAF089}

/* 전화상담 */
.co-sel-list{background:#fff;border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid var(--bd)}
.co-sel-item{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #F0F4F8;cursor:pointer}
.co-sel-item:last-child{border-bottom:none}
.co-sel-item.on{background:var(--M2);border-right:3px solid var(--M)}
.cform{background:#fff;border-radius:10px;padding:14px;border:1px solid var(--bd)}
.cform h3{font-size:13px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}
.crow{margin-bottom:10px}
.crow .cq{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:3px}
.crow .cs{font-size:10px;color:var(--M);background:var(--M2);padding:4px 8px;border-radius:5px;margin-bottom:4px;font-style:italic}
.cinput{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;font-size:12px;font-family:inherit;outline:none;background:#fff}
.cinput:focus{border-color:var(--M)}
.fcat-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;padding:8px 0 4px;letter-spacing:.4px}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
.fci{display:flex;align-items:center;gap:6px;padding:6px 9px;border:1px solid var(--bd);border-radius:6px;font-size:11px;cursor:pointer;background:#fff}
.fci input{accent-color:var(--M);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.fci.ck{border-color:var(--M);background:var(--M2);color:var(--M);font-weight:600}

/* 대시보드 */
.dash-card{background:#fff;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--bd)}
.dash-card h3{font-size:13px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.rrow{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F0F4F8;font-size:12px}
.rrow:last-child{border-bottom:none}
.rn{width:20px;height:20px;border-radius:50%;background:var(--bg);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--t3);flex-shrink:0}
.rn.top{background:var(--or);color:#fff}
.bm{flex:1;background:#EDF2F7;border-radius:4px;height:7px;overflow:hidden}
.bmf{height:100%;border-radius:4px}
.dl-btn{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.dl-btn .btn{width:100%;justify-content:center;padding:14px}

/* 모달 */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:20px}
.mh{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
.mh h2{font-size:15px;font-weight:700;flex:1}
.mf{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--bd)}
.fr{margin-bottom:10px}
.fr label{display:block;font-size:10px;color:var(--t3);margin-bottom:3px;font-weight:700;text-transform:uppercase}
.fr input,.fr textarea,.fr select{width:100%;padding:9px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:#fff}
.fr input:focus,.fr textarea:focus,.fr select:focus{border-color:var(--M)}
.fr textarea{resize:vertical;min-height:60px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sec-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;margin:12px 0 7px;padding-bottom:4px;border-bottom:1px solid var(--bd)}

/* AI */
.ai-wrap{padding:14px}
.ai-wrap textarea{width:100%;padding:10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;min-height:80px;resize:vertical;font-family:inherit;outline:none;margin-bottom:8px}
.air{font-size:12px;line-height:1.85;padding:12px;background:var(--bg);border-radius:8px;white-space:pre-wrap;display:none;margin-top:8px}
.qb{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}

/* 알림 */
.alert-bar{padding:9px 14px;display:flex;align-items:center;gap:8px;font-size:12px;color:#fff}
.alert-bar.warn{background:linear-gradient(90deg,#D69E2E,#C05621)}
.alert-bar.info{background:linear-gradient(90deg,#2B6CB0,#2C7A7B)}
.atag{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 7px;font-size:10px;font-weight:700;flex-shrink:0}

.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:80px;right:14px;left:14px;background:#1A202C;color:#fff;border-radius:10px;padding:12px 16px;font-size:13px;z-index:9999;text-align:center;transform:translateY(100px);opacity:0;transition:all .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#276749}.toast.err{background:#9B2C2C}
.empty{text-align:center;padding:3rem 1rem;color:var(--t3);font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-b">M</div>메뉴잇 경쟁사 비교</div>
  <div class="topbar-r">
    <button class="btn btn-ghost btn-sm" onclick="oAI()"><i class="ti ti-robot"></i></button>
    <button class="btn btn-blue btn-sm" onclick="oAdd()"><i class="ti ti-plus"></i> 추가</button>
  </div>
</div>

<div id="alertArea"></div>

<!-- 페이지1: 목록 -->
<div class="page on" id="page-list">
  <div class="stat-grid" id="statCards"></div>
  <div class="fbar">
    <div class="frow">
      <input class="fi" id="si" placeholder="업체명, 가격 검색..." oninput="render()">
      <select class="fi" id="f판매" onchange="render()" style="flex:0;min-width:110px"><option value="">판매방식 전체</option><option>렌탈</option><option>할부구매</option><option>무약정</option></select>
    </div>
    <div class="gchips">
      <div class="gc on all" onclick="setGF('all',this)">전체</div>
      <div class="gc S" onclick="setGF('S',this)">S</div>
      <div class="gc A" onclick="setGF('A',this)">A</div>
      <div class="gc B" onclick="setGF('B',this)">B</div>
      <div class="gc C" onclick="setGF('C',this)">C</div>
      <div class="gc D" onclick="setGF('D',this)">D</div>
    </div>
  </div>
  <div id="coList"></div>
  <div style="font-size:11px;color:var(--t3);text-align:center;margin-top:4px" id="cnt"></div>
</div>

<!-- 페이지2: 비교 -->
<div class="page" id="page-compare">
  <div class="banner">
    <h3>메뉴잇 기준 경쟁사 비교</h3>
    <p>자체렌탈 · 해지 25% · 연동포스 실시간+에이전트20개이상 · VAN(KICC/KIS/NICE)</p>
  </div>
  <p style="font-size:11px;color:var(--t3);margin-bottom:8px">비교할 업체 선택 (최대 4개)</p>
  <div class="cmp-chips" id="cmpChips"></div>
  <div id="cmpCards"></div>
</div>

<!-- 페이지3: 전화상담 -->
<div class="page" id="page-call">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div>
      <h2 style="font-size:15px;font-weight:700">전화상담 입력</h2>
      <p style="font-size:11px;color:var(--t3)">업체 선택 → 답변 입력 → 저장</p>
    </div>
    <button class="btn btn-green btn-sm" onclick="saveCall()"><i class="ti ti-device-floppy"></i> 저장</button>
  </div>
  <div class="co-sel-list" id="callList"></div>
  <div id="callForm"></div>
</div>

<!-- 페이지4: 대시보드/다운로드 -->
<div class="page" id="page-dash">
  <div class="dash-card">
    <h3><i class="ti ti-download" style="color:var(--M)"></i> 다운로드</h3>
    <div class="dl-btn">
      <button class="btn btn-blue" onclick="dlExcel()"><i class="ti ti-file-spreadsheet"></i> 엑셀 다운로드 (원본 양식 5시트)</button>
      <button class="btn btn-white" onclick="dlPDF()"><i class="ti ti-file-type-pdf" style="color:var(--or)"></i> PDF 보고서</button>
    </div>
  </div>
  <div class="dash-card">
    <h3><i class="ti ti-chart-bar" style="color:var(--M)"></i> 가격 순위 (후불형)</h3>
    <div id="priceRank"></div>
  </div>
  <div class="dash-card">
    <h3><i class="ti ti-alert-triangle" style="color:var(--err)"></i> 영업 위협도</h3>
    <div id="threatMeter"></div>
  </div>
  <div class="dash-card">
    <h3><i class="ti ti-message" style="color:var(--or)"></i> 경쟁사별 대응 멘트</h3>
    <div id="mentBox"></div>
  </div>
</div>

<!-- 하단 탭 -->
<div class="tab-bar">
  <button class="tb on" id="tb0" onclick="goTab(0)"><i class="ti ti-list"></i>목록</button>
  <button class="tb" id="tb1" onclick="goTab(1)"><i class="ti ti-columns"></i>비교</button>
  <button class="tb" id="tb2" onclick="goTab(2)"><i class="ti ti-phone-call"></i>전화상담</button>
  <button class="tb" id="tb3" onclick="goTab(3)"><i class="ti ti-download"></i>다운로드</button>
</div>

<!-- AI 모달 -->
<div id="mAI" style="display:none" class="mbg" onclick="if(event.target===this)cl('mAI')">
<div class="modal">
  <div class="mh"><i class="ti ti-robot" style="color:var(--M)"></i><h2>AI 경쟁사 분석</h2><button class="btn btn-white btn-sm" onclick="cl('mAI')">닫기</button></div>
  <div class="ai-wrap">
    <textarea id="aq" placeholder="예) 히엘페이 가격? / 메뉴잇 강점? / 위약금 유리한 업체?"></textarea>
    <button class="btn btn-blue" id="aibtn" onclick="runAI()" style="width:100%"><i class="ti ti-send"></i> 분석 시작</button>
    <div id="ar" class="air"></div>
  </div>
  <div class="qb">
    <button class="btn btn-white btn-sm" onclick="sq('후불형 가격 저렴한 순서')">💰 가격순위</button>
    <button class="btn btn-white btn-sm" onclick="sq('메뉴잇 대비 경쟁사 강약점')">🏆 메뉴잇 우위</button>
    <button class="btn btn-white btn-sm" onclick="sq('티오더 고객 전환 설득 멘트')">💬 설득멘트</button>
    <button class="btn btn-white btn-sm" onclick="sq('위협도 높은 업체 대응 전략')">🎯 위협대응</button>
  </div>
</div></div>

<!-- 업체 추가/수정 모달 -->
<div id="mAdd" style="display:none" class="mbg" onclick="if(event.target===this)cl('mAdd')">
<div class="modal">
  <div class="mh"><i class="ti ti-building-store" style="color:var(--M)"></i><h2 id="mAddT">업체 추가</h2><button class="btn btn-white btn-sm" onclick="cl('mAdd')">취소</button></div>
  <input type="hidden" id="eid">
  <div class="fg2">
    <div class="fr"><label>업체명 *</label><input id="fc"></div>
    <div class="fr"><label>등급</label><select id="fg"><option value="S">S</option><option value="A">A</option><option value="B" selected>B</option><option value="C">C</option><option value="D">D</option></select></div>
  </div>
  <div class="fg2">
    <div class="fr"><label>판매방식</label><input id="f판매방식" placeholder="할부구매, 렌탈, 무약정"></div>
    <div class="fr"><label>약정</label><input id="f약정" placeholder="3년, 무약정"></div>
  </div>
  <div class="fg2">
    <div class="fr"><label>후불형</label><input id="f후불형" placeholder="19,000원"></div>
    <div class="fr"><label>선불형</label><input id="f선불형" placeholder="21,000원"></div>
  </div>
  <div class="fg2">
    <div class="fr"><label>해지위약금</label><input id="f해지" placeholder="위약금 100%"></div>
    <div class="fr"><label>AS</label><input id="fAS" placeholder="파손 불가"></div>
  </div>
  <div class="fg2">
    <div class="fr"><label>콜센터</label><input id="f콜센터" placeholder="연중무휴 새벽2시"></div>
    <div class="fr"><label>확인날짜</label><input id="f확인날짜" placeholder="2026.7.3"></div>
  </div>
  <div class="fr"><label>프로모션</label><textarea id="f프로모션"></textarea></div>
  <div class="fr"><label>메모</label><textarea id="fmemo"></textarea></div>
  <div class="mf">
    <button class="btn btn-white" style="flex:1" onclick="cl('mAdd')">취소</button>
    <button class="btn btn-blue" style="flex:2" onclick="saveD()"><i class="ti ti-device-floppy"></i> 저장</button>
  </div>
</div></div>

<!-- 상세 모달 -->
<div id="mDet" style="display:none" class="mbg" onclick="if(event.target===this)cl('mDet')">
<div class="modal" id="mDetBody"></div></div>

<div class="toast" id="toast"></div>

<script>
const LK = 'menueat_v8';

var PAGES = ['list','compare','call','dash'];
function goTab(idx) {
  document.querySelectorAll('.tb').forEach(function(t){ t.classList.remove('on'); });
  document.getElementById('tb'+idx).classList.add('on');
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('on'); });
  document.getElementById('page-'+PAGES[idx]).classList.add('on');

function gBadge(g) {
  return '<span class="grade g'+g+'">'+g+'</span>';
}
function gPrice(s) { return parseInt((s||'').replace(/[^0-9]/g,'')) || 0; }
function vsBadge(d) {
  var g=0, b=0, p=gPrice(d.후불형);
  if (p>0 && p<15000) b++; else if (p>17000) g++;
  if (d.해지 && d.해지.indexOf('100%') >= 0) g++;
  if (b>g) return '<span class="tag tbad">주의 '+b+'건</span>';
  if (g>b) return '<span class="tag tok">유리 '+g+'건</span>';
  return '<span class="tag twarn">혼합</span>';
}

var GFilter = 'all';
function setGF(g, el) {
  GFilter = g;
  document.querySelectorAll('.gc').forEach(function(c){ c.classList.remove('on'); });
  el.classList.add('on');
  render();
}

function render() {
  var q = (document.getElementById('si')||{value:''}).value.toLowerCase();
  var fp = document.getElementById('f판매').value;

    return (!q || t.indexOf(q) >= 0) && (!fp || d.판매방식 === fp) && (GFilter === 'all' || d.grade === GFilter);
  });
  var el = document.getElementById('coList');
  if (!F.length) { el.innerHTML = '<div class="empty">검색 결과 없음</div>'; document.getElementById('cnt').textContent=''; return; }
  el.innerHTML = F.map(function(d) {
    var fc = d.기능수 || Object.keys(d.features||{}).length;
    return '<div class="co-card">'
      + '<div class="co-head">' + gBadge(d.grade) + '<div class="co-name">' + d.c + (needsRenew(d)?'<span class="updt-dot"></span>':'') + '</div>' + vsBadge(d) + '</div>'
      + '<div class="co-grid">'
      + '<div class="co-item"><div class="k">후불형</div><div class="v orange">' + (d.후불형||'-') + '</div></div>'
      + '<div class="co-item"><div class="k">선불형</div><div class="v">' + (d.선불형||'-') + '</div></div>'
      + '<div class="co-item"><div class="k">해지위약금</div><div class="v' + (d.해지&&d.해지.indexOf('100%')>=0?' red':'') + '">' + ((d.해지||'-').substring(0,14)) + '</div></div>'
      + '<div class="co-item"><div class="k">AS</div><div class="v">' + (d.AS||'-') + '</div></div>'
      + '<div class="co-item"><div class="k">콜센터</div><div class="v">' + ((d.콜센터||'-').substring(0,14)) + '</div></div>'
      + '<div class="co-item"><div class="k">기능수</div><div class="v">' + fc + '개</div></div>'
      + '</div>'
      + '<div class="co-actions">'
      + '<button class="btn btn-white btn-sm" style="flex:1" data-id="' + d.id + '" onclick="oDet(this.dataset.id)"><i class="ti ti-eye"></i> 상세</button>'
      + '<button class="btn btn-white btn-sm" data-id="' + d.id + '" onclick="oEdit(this.dataset.id)"><i class="ti ti-edit"></i></button>'

function renderStat() {
  var SA = D.filter(function(d){ return d.grade==='S'||d.grade==='A'; }).length;
  var renew = D.filter(needsRenew).length;
  var prices = D.filter(function(d){ return d.후불형&&gPrice(d.후불형)>0; }).map(function(d){ return gPrice(d.후불형); });
  var avg = prices.length ? Math.round(prices.reduce(function(a,b){return a+b;})/prices.length) : 0;
  document.getElementById('statCards').innerHTML = [
    {v:D.length+'개', l:'등록 업체', cls:''},
    {v:SA+'개', l:'S·A등급 핵심', cls:'red'},
    {v:(avg/1000).toFixed(1)+'만원', l:'평균 후불형', cls:'orange'},
    {v:D.filter(function(d){return d.callDate;}).length+'/'+D.length, l:'상담 완료', cls:'green'},
  ].map(function(s){ return '<div class="sc '+s.cls+'"><div class="sv">'+s.v+'</div><div class="sl">'+s.l+'</div></div>'; }).join('');
}

    var p = gPrice(d.후불형), goods=[], bads=[];

    if (d.프로모션&&d.프로모션.length>10) bads.push('파격 프로모션 주의');

function updFCI(i) {
  var cb = document.getElementById('fcb_'+i);
  var el = document.querySelector('[data-fi="'+i+'"]');
  if (el) el.classList.toggle('ck', cb.checked);
}
function saveCall() {
  if (!callId) { toast('업체를 먼저 선택하세요','err'); return; }
  var idx = D.findIndex(function(x){ return x.id===callId; });
  CALL_ROWS.forEach(function(r) {
    var e = document.getElementById('cf_'+r.k);
    if (e) D[idx][r.k] = e.value.trim();
  });
  var allF = Object.values(FEAT_CATS).reduce(function(a,b){return a.concat(b);},[]);
  var feats = {};
  allF.forEach(function(f,i) {
    var cb = document.getElementById('fcb_'+i);
    if (cb && cb.checked) feats[f] = '가능';
  });
  D[idx].features = feats;
  D[idx].기능수 = Object.keys(feats).length;
  var cl2 = document.getElementById('cf_callLog');
  if (cl2) D[idx].callLog = cl2.value;
  D[idx].callDate = new Date().toLocaleDateString('ko-KR');
  D[idx].확인날짜 = new Date().toISOString().slice(0,10).replace(/-/g,'.');
  sv(); render(); renderStat(); renderCallList(); renderDash(); showAlerts();
  toast(D[idx].c+' 저장 완료!','ok');
}

function renderDash() {
  var sorted = D.map(function(d){return{c:d.c,val:gPrice(d.후불형),g:d.grade};}).filter(function(x){return x.val>0;}).sort(function(a,b){return a.val-b.val;});

  document.getElementById('priceRank').innerHTML = sorted.map(function(s,i){
    var c=s.g==='S'?'#7C3AED':s.g==='A'?'var(--or)':s.g==='B'?'#D69E2E':'#718096';

      +'<span style="flex:1;font-weight:600">'+s.c+'</span>'
      +'<div class="bm" style="flex:2"><div class="bmf" style="width:'+Math.round(s.val/mx*100)+'%;background:'+c+'"></div></div>'
      +'<span style="width:65px;text-align:right;font-weight:700;color:'+c+'">'+s.val.toLocaleString()+'원</span></div>';
  }).join('');

  var threats = D.slice().sort(function(a,b){return(b.위협도||0)-(a.위협도||0);}).slice(0,8);

      +'<div style="font-size:11px;color:var(--t2);margin-top:4px;line-height:1.7">'+MENT[name]+'</div></div>';
  }).join('');
}

  var ctx=D.map(function(d){return d.c+'('+d.grade+'): 후불형='+d.후불형+'|해지='+d.해지+'|AS='+d.AS+'|콜센터='+d.콜센터+'|기능수='+(d.기능수||0);}).join('\n');
  try{
    var r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,system:'메뉴잇 영업팀 경쟁사 분석 AI.\n경쟁사:\n'+ctx+'\n\n메뉴잇: 자체렌탈·해지25%+할인반환금·연동포스 실시간(이지/오케이)+에이전트20개이상·VAN(KICC/KIS/NICE)·메뉴잇포스.\n실용적 한국어 답변.',messages:[{role:'user',content:q}]})});
    var j=await r.json();res.textContent=j.content?.[0]?.text||'응답 없음';
  }catch(e){res.textContent='오류: '+e.message;}
  btn.innerHTML='<i class="ti ti-send"></i> 분석 시작';btn.disabled=false;
}
